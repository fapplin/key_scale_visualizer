components:
- components:
  - layout_properties: {col_xs: 0, row: FMSEUD, width_xs: 3}
    name: label_1
    properties: {align: right, text: 'Number of LEDs:'}
    type: Label
  - data_bindings:
    - {code: 'self.item[''number_of_leds'']', property: text, writeback: true}
    layout_properties: {col_xs: 3, row: FMSEUD, width_xs: 2}
    name: text_box_number_of_leds
    properties: {role: outlined}
    type: TextBox
  - layout_properties: {col_xs: 1, row: MZYZZS, width_xs: 2}
    name: label_2
    properties: {align: right, text: 'LED Positions:'}
    type: Label
  - data_bindings:
    - {code: 'self.item[''led_positions'']', property: text, writeback: true}
    layout_properties: {col_xs: 3, row: MZYZZS, width_xs: 9}
    name: text_box_led_positions
    properties: {role: outlined}
    type: TextBox
  - layout_properties: {col_xs: 0, row: VPCFZW, width_xs: 3}
    name: label_3
    properties: {align: right, text: 'Number of Octaves:'}
    type: Label
  - data_bindings:
    - {code: 'self.item[''number_of_octaves'']', property: selected_value, writeback: true}
    event_bindings: {}
    layout_properties: {col_xs: 3, row: VPCFZW, width_xs: 2}
    name: drop_down_1
    properties:
      items: ['1', '2', '3', '4', '5', '6', '7', '8']
      role: outlined
    type: DropDown
  layout_properties: {grid_position: 'BPTEYR,GTHFRK'}
  name: grid_panel_1
  properties: {background: 'theme:Secondary Container'}
  type: GridPanel
- event_bindings: {}
  layout_properties: {grid_position: 'NEJKRX,VWFMHM'}
  name: button_close
  properties: {role: elevated-button, text: Close}
  type: Button
container:
  properties: {background: 'theme:Primary Container'}
  type: ColumnPanel
is_package: true
